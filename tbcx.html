<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>投标必查 · 政务查询网站导航</title>
<style>
  :root{
    --bg:#0b1220; --bg2:#0f1a2e; --panel:#16233c; --panel2:#1c2c49;
    --border:#2a3a5c; --border2:#36507e;
    --txt:#e6edf7; --sub:#9fb0cc; --muted:#6f81a3;
    --accent:#38bdf8; --accent2:#f59e0b; --ok:#34d399; --bad:#f87171;
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"PingFang SC","Microsoft YaHei",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%, #15294d 0%, var(--bg) 55%) fixed;
    color:var(--txt); line-height:1.6; min-height:100vh;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:32px 20px 64px}
  header.hero{
    background:linear-gradient(135deg,#13243f 0%, #1a3158 100%);
    border:1px solid var(--border2); border-radius:var(--radius);
    padding:28px 30px; position:relative; overflow:hidden;
    box-shadow:0 18px 40px -20px rgba(0,0,0,.7);
  }
  header.hero::after{
    content:"⚑"; position:absolute; right:-10px; top:-18px; font-size:140px;
    color:rgba(56,189,248,.07); transform:rotate(12deg);
  }
  .hero h1{margin:0 0 6px; font-size:26px; letter-spacing:.5px}
  .hero h1 .pin{color:var(--accent)}
  .hero p{margin:0; color:var(--sub); font-size:14px}
  .stats{display:flex; gap:14px; flex-wrap:wrap; margin-top:18px}
  .stat{background:rgba(56,189,248,.08); border:1px solid var(--border);
    border-radius:12px; padding:8px 14px; font-size:13px; color:var(--sub)}
  .stat b{color:var(--accent); font-size:18px; margin-right:4px}

  .toolbar{display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin:24px 0 8px}
  .search{flex:1; min-width:240px; position:relative}
  .search input{
    width:100%; padding:12px 14px 12px 40px; border-radius:12px;
    border:1px solid var(--border2); background:var(--panel); color:var(--txt);
    font-size:15px; outline:none; transition:.2s;
  }
  .search input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(56,189,248,.15)}
  .search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:.6}
  .btn{
    border:1px solid var(--border2); background:var(--panel); color:var(--txt);
    padding:11px 16px; border-radius:12px; cursor:pointer; font-size:14px; transition:.18s;
    white-space:nowrap;
  }
  .btn:hover{border-color:var(--accent); color:var(--accent)}
  .btn.primary{background:linear-gradient(135deg,#1d7fb8,#38bdf8); border:none; color:#04121f; font-weight:600}
  .btn.primary:hover{filter:brightness(1.08); color:#04121f}

  .chips{display:flex; gap:8px; flex-wrap:wrap; margin:6px 0 18px}
  .chip{
    border:1px solid var(--border); background:var(--panel); color:var(--sub);
    padding:6px 13px; border-radius:999px; font-size:13px; cursor:pointer; transition:.18s;
  }
  .chip:hover{color:var(--txt); border-color:var(--border2)}
  .chip.active{background:var(--accent); color:#04121f; border-color:var(--accent); font-weight:600}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:16px}
  .card{
    background:linear-gradient(180deg,var(--panel) 0%, var(--bg2) 100%);
    border:1px solid var(--border); border-radius:var(--radius); padding:18px;
    position:relative; transition:.2s; display:flex; flex-direction:column;
  }
  .card:hover{transform:translateY(-3px); border-color:var(--border2); box-shadow:0 16px 30px -18px rgba(0,0,0,.8)}
  .card .top{display:flex; align-items:center; gap:12px; margin-bottom:10px}
  .no{
    width:34px; height:34px; flex:none; border-radius:10px; display:grid; place-items:center;
    font-weight:700; font-size:15px; color:#04121f;
    background:linear-gradient(135deg,var(--accent),#7dd3fc);
  }
  .card h3{margin:0; font-size:16.5px; line-height:1.3}
  .domain{color:var(--accent); font-size:12.5px; margin-top:2px; word-break:break-all}
  .desc{color:var(--sub); font-size:13.5px; margin:10px 0 14px; flex:1}
  .tags{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px}
  .tag{font-size:11.5px; padding:3px 9px; border-radius:999px; background:rgba(245,158,11,.12);
    color:var(--accent2); border:1px solid rgba(245,158,11,.25)}
  .actions{display:flex; gap:8px}
  .actions a{flex:1; text-align:center; text-decoration:none; padding:9px 0; border-radius:10px;
    font-size:13.5px; font-weight:600}
  .go{background:linear-gradient(135deg,#1d7fb8,#38bdf8); color:#04121f}
  .go:hover{filter:brightness(1.08)}
  .copy{background:transparent; border:1px solid var(--border2); color:var(--sub); cursor:pointer}
  .copy:hover{color:var(--txt); border-color:var(--accent)}
  .check{position:absolute; top:14px; right:14px}
  .check input{width:18px; height:18px; accent-color:var(--ok); cursor:pointer}

  .progress{margin:26px 0 4px; background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:14px 18px; display:flex; align-items:center; gap:16px}
  .bar{flex:1; height:10px; background:#0c1626; border-radius:999px; overflow:hidden; border:1px solid var(--border)}
  .bar > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--ok),#22d3ee); transition:.3s}
  .progress span{font-size:13px; color:var(--sub); white-space:nowrap}
  .progress b{color:var(--ok)}

  .toast{position:fixed; left:50%; bottom:30px; transform:translateX(-50%) translateY(20px);
    background:#04121f; border:1px solid var(--border2); color:var(--txt); padding:11px 20px;
    border-radius:12px; font-size:14px; opacity:0; pointer-events:none; transition:.25s; z-index:99}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  footer{margin-top:34px; text-align:center; color:var(--muted); font-size:12.5px}
  .empty{text-align:center; color:var(--muted); padding:50px 0; grid-column:1/-1}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1>🧭 投标必查 · <span class="pin">政务查询网站导航</span></h1>
    <p>16 个权威官方平台，覆盖信用、司法、资质、知识产权、标准、税务银行等投标核查场景。链接直达，进度留痕。</p>
    <div class="stats">
      <div class="stat"><b id="stTotal">16</b>个权威平台</div>
      <div class="stat"><b>100%</b>官方域名</div>
      <div class="stat"><b>6</b>大核查场景</div>
      <div class="stat">数据截至 2026-07</div>
    </div>
  </header>

  <div class="toolbar">
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9fb0cc" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="搜索网站名称 / 用途 / 域名…" />
    </div>
    <button class="btn" id="copyAll">📋 复制全部网址</button>
    <button class="btn" id="resetCheck">↺ 重置核查</button>
  </div>

  <div class="chips" id="chips"></div>

  <div class="grid" id="grid"></div>

  <div class="progress">
    <span>本单核查进度</span>
    <div class="bar"><i id="bar"></i></div>
    <span><b id="pNum">0</b> / <span id="pTot">16</span> 已查</span>
  </div>

  <footer>提示：本页为离线工具，所有链接均指向政府/事业单位官方网站，请核对域名后再填报。核查状态自动保存在本地浏览器。</footer>
</div>

<div class="toast" id="toast"></div>

<script>
const SITES = [
  {no:1, name:"中国政府采购网", url:"http://www.ccgp.gov.cn/", tags:["采购","失信"],
   desc:"财政部唯一指定的政府采购信息发布媒体，也是最权威的网站。可查询“近三年有无在政府采购活动中出现重大违法失信行为记录”。"},
  {no:2, name:"中央政府采购网", url:"https://www.zycg.gov.cn/", tags:["采购"],
   desc:"中央国家机关政府采购中心（国采中心）主办的官方平台，是中央预算单位政府集中采购的核心载体。可查询中央政府采购招标/中标/成交公告、电子卖场、定点采购信息，以及供应商参与中央政府采购的违法违规与不良行为记录。"},
  {no:3, name:"全国公共资源交易平台", url:"https://www.ggzy.gov.cn/", tags:["交易","采购"],
   desc:"提供各类公共资源交易信息的发布与查询功能。可查询招投标、土地使用权和矿业权出让、国有产权交易、政府采购等公共资源交易信息。"},
  {no:4, name:"信用中国", url:"https://www.creditchina.gov.cn/", tags:["信用","失信"],
   desc:"提供企业信用信息查询功能，可查询企业的信用信息，包括行政处罚、经营异常名录、严重失信主体名单等。"},
  {no:5, name:"小微企业名录查询", url:"https://xwqy.gsxt.gov.cn/", tags:["企业","小微"],
   desc:"全国个体私营经济发展服务网（小微企业名录）。提供小微企业信息查询功能，可查询国家扶持的小微企业信息，常用于中小企业声明函佐证。"},
  {no:6, name:"中国执行信息公开网", url:"http://zxgk.court.gov.cn/", tags:["司法","失信"],
   desc:"提供法院的执行信息和相关法律文书，可查询被执行人（失信被执行人/“老赖”）信息以及相关判决、裁定等文书。"},
  {no:7, name:"中国裁判文书网", url:"https://wenshu.court.gov.cn/", tags:["司法"],
   desc:"提供裁判文书的查询和浏览功能，一般用于查询企业的司法信息，主要通过查询辨别公司或法人是否曾有违法犯罪记录。"},
  {no:8, name:"国家企业信用信息公示系统", url:"https://www.gsxt.gov.cn/", tags:["信用","企业"],
   desc:"提供企业信用信息查询功能，可查询企业的信用信息，包括行政处罚、经营异常名录、严重违法失信名单等基础工商信息。"},
  {no:9, name:"国家职业资格证书全国联网查询", url:"https://zscx.osta.org.cn/", tags:["资质","人员"],
   desc:"技能人才评价证书全国联网查询（osta.org.cn，人社部鉴定中心）。用于查询人员职业资格证书是否真实有效，也可查技能人员职业资格目录。"},
  {no:10, name:"全国银行行号查询", url:"http://www.pcac.org.cn/", tags:["银行"],
   desc:"银行行号（联行号/CNAPS号）查询。最权威官方入口为中国支付清算协会“支付系统行号查询”，也可通过中国人民银行官网、各银行官网/APP查询。"},
  {no:11, name:"国家税务总局", url:"https://www.chinatax.gov.cn/", tags:["税务"],
   desc:"一般用于提供各类完税证明，或在商业信誉等证明材料中需提供银行和税务信用评价系统记录时使用。"},
  {no:12, name:"全国建筑市场监管公共服务平台", url:"http://jzsc.mohurd.gov.cn/", tags:["资质","建筑"],
   desc:"业内常说的住建部“四库一平台”。可查询企业数据、人员数据、项目数据以及诚信记录，四库互联互通，保证数据的全面性、真实性、关联性和动态性。"},
  {no:13, name:"国家市场监督管理总局服务平台", url:"https://www.samr.gov.cn/", tags:["企业","监管"],
   desc:"主要负责市场综合监督管理、市场主体统一登记注册，以及规范市场监管行政执法行为。企业登记、监管信息权威来源。"},
  {no:14, name:"国家知识产权公共服务网", url:"https://ggfw.cnipa.gov.cn/", tags:["知识产权"],
   desc:"提供知识产权相关的查询、监管、维权、管理等服务。可查询的数据包括专利、商标、著作权等多个领域的知识产权。"},
  {no:15, name:"全国认证认可信息公共服务平台", url:"https://cx.cnca.cn/", tags:["认证","资质"],
   desc:"由国家市场监督管理总局(SAMR)推出。为用户提供认证认可信息查询、认证认可服务、政策法规查询、企业标准备案、自我声明等服务。"},
  {no:16, name:"全国标准信息公共服务平台", url:"https://std.samr.gov.cn/", tags:["标准"],
   desc:"各类标准有效期查询，一般用于招投标加分项。可查国家标准、行业标准、地方标准等现行有效状态。"},
];

const CATS = ["全部","信用/失信","司法","资质/人员","知识产权","认证/标准","交易/采购","税务/银行","企业基础","小微"];
const CATMAP = {
  "信用/失信":["信用","失信"], "司法":["司法"], "资质/人员":["资质","人员","建筑"],
  "知识产权":["知识产权"], "认证/标准":["认证","标准"], "交易/采购":["交易","采购"],
  "税务/银行":["税务","银行"], "企业基础":["企业","监管"], "小微":["小微"]
};

const grid = document.getElementById('grid');
const chipsBox = document.getElementById('chips');
let activeCat = "全部";
let keyword = "";
const CHECK_KEY = "tender_site_checklist_v1";
let checked = JSON.parse(localStorage.getItem(CHECK_KEY) || "[]");

function saveCheck(){ localStorage.setItem(CHECK_KEY, JSON.stringify(checked)); updateProgress(); }
function updateProgress(){
  const n = checked.length, t = SITES.length;
  document.getElementById('bar').style.width = (n/t*100)+"%";
  document.getElementById('pNum').textContent = n;
  document.getElementById('pTot').textContent = t;
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'),1600);
}
function inCat(site, cat){
  if(cat==="全部") return true;
  const map = CATMAP[cat] || [cat];
  return site.tags.some(t=>map.includes(t));
}
function matchKw(site, kw){
  if(!kw) return true;
  kw = kw.toLowerCase();
  return (site.name+site.desc+site.url+site.tags.join(" ")).toLowerCase().includes(kw);
}
function render(){
  const list = SITES.filter(s=>inCat(s,activeCat) && matchKw(s,keyword));
  grid.innerHTML = "";
  if(!list.length){
    grid.innerHTML = '<div class="empty">没有匹配的网站，换个关键词或分类试试 🔍</div>';
    return;
  }
  list.forEach(s=>{
    const isC = checked.includes(s.no);
    const el = document.createElement('div');
    el.className = "card";
    el.innerHTML = `
      <label class="check" title="标记已核查">
        <input type="checkbox" data-no="${s.no}" ${isC?'checked':''}/>
      </label>
      <div class="top">
        <div class="no">${s.no}</div>
        <div>
          <h3>${s.name}</h3>
          <div class="domain">${s.url}</div>
        </div>
      </div>
      <div class="tags">${s.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      <div class="desc">${s.desc}</div>
      <div class="actions">
        <a class="go" href="${s.url}" target="_blank" rel="noopener">前往查询 ↗</a>
        <button class="copy" data-url="${s.url}">复制链接</button>
      </div>`;
    grid.appendChild(el);
  });
  bindCardEvents();
}
function bindCardEvents(){
  grid.querySelectorAll('.check input').forEach(c=>{
    c.addEventListener('change', e=>{
      const no = +e.target.dataset.no;
      if(e.target.checked){ if(!checked.includes(no)) checked.push(no); }
      else { checked = checked.filter(x=>x!==no); }
      saveCheck();
      e.target.closest('.card').style.opacity = e.target.checked ? ".92" : "1";
    });
  });
  grid.querySelectorAll('.copy').forEach(b=>{
    b.addEventListener('click', e=>{
      e.stopPropagation();
      const u = b.dataset.url;
      navigator.clipboard.writeText(u).then(()=>toast("已复制："+u)).catch(()=>toast("复制失败，请手动复制"));
    });
  });
}
// chips
CATS.forEach((c,i)=>{
  const b = document.createElement('button');
  b.className = "chip"+(i===0?' active':'');
  b.textContent = c;
  b.addEventListener('click', ()=>{
    activeCat = c;
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    render();
  });
  chipsBox.appendChild(b);
});
document.getElementById('q').addEventListener('input', e=>{ keyword = e.target.value.trim(); render(); });
document.getElementById('copyAll').addEventListener('click', ()=>{
  const all = SITES.map(s=>s.no+". "+s.name+"  "+s.url).join("\n");
  navigator.clipboard.writeText(all).then(()=>toast("已复制全部 16 个网址")).catch(()=>toast("复制失败"));
});
document.getElementById('resetCheck').addEventListener('click', ()=>{
  checked = []; saveCheck(); render(); toast("已重置核查清单");
});

render(); updateProgress();
</script>
</body>
</html>
